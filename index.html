    <script>

        function typeWriter(element, text, speed) {
            let i = 0;

            function type() {
                if (i < text.length) {
                    $(element).append(text.charAt(i));
                    i++;
                    setTimeout(type, speed);
                }
            }

            type();
        }


        $(document).ready(function () {
            $("#start-bg")
                .animate({width: '100%'}, 300)
                .animate({height: '100%'}, 300)
                
            setTimeout(
                function() {
                    typeWriter("#start-1st-text", "~$ lucas' home.html", 1)
                    setTimeout(
                        function() {
                            document.getElementById("start-2nd-text").innerHTML = "▯"

                            setTimeout(
                                function() {
                                    $("#start-1st-text").hide()
                                    $("#start-2nd-text").hide()

                                    $("#start-bg")
                                        .animate({height: '-1000%'}, 300)
                                        .animate({width: '-1000%'}, 300)

                                    setTimeout(
                                        function() {
                                            $("#start-bg").hide()
                                        }, 750
                                    )
                                }, 500
                            )

                        }, 1000
                    )
                }, 1500
            )
        })

    </script>

    <script>
        
        function makeDraggable(element) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            element.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                // get the mouse cursor position at startup:
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                // call a function whenever the cursor move:
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                // calculate the new cursor position:
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                // set the element's new position:
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                /* stop moving when mouse button is released:*/
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        makeDraggable(document.getElementById("bar-visualizer"))
        makeDraggable(document.getElementById("bar-socials"))
        makeDraggable(document.getElementById("bar-links"))
            
    </script>

    <script>

        const control = document.getElementById("control")
        const audio = document.getElementById("audio")

        audio.volume = 0.3;
        function playPause() {
            if (control.classList.contains("fa-pause")){
                audio.pause()
                control.classList.remove("fa-pause")
                control.classList.add("fa-play")
            }
            else{
                audio.play()
                control.classList.remove("fa-play")
                control.classList.add("fa-pause")
            }
        }

        document.getElementById("control").addEventListener("click", playPause)

    </script>
